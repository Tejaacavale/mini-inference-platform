apiVersion: v1
kind: Service
metadata:
  name: inference
  labels:
    app: inference
  annotations:
    prometheus.io/scrape: "true"
    prometheus.io/port: "8000"
    prometheus.io/path: "/metrics"
spec:
  type: ClusterIP
  selector:
    app: inference
  ports:
    - name: http
      port: 80
      targetPort: 8000
      protocol: TCP
