---
# Provision the Prometheus datasource.
apiVersion: v1
kind: ConfigMap
metadata:
  name: grafana-datasources
data:
  datasources.yaml: |
    apiVersion: 1
    datasources:
      - name: Prometheus
        type: prometheus
        access: proxy
        url: http://prometheus:9090
        isDefault: true
---
# Tell Grafana where to find dashboards.
apiVersion: v1
kind: ConfigMap
metadata:
  name: grafana-dashboard-provider
data:
  provider.yaml: |
    apiVersion: 1
    providers:
      - name: default
        orgId: 1
        folder: ""
        type: file
        disableDeletion: false
        editable: true
        options:
          path: /var/lib/grafana/dashboards
---
# The dashboard itself: four golden signals + batch size.
apiVersion: v1
kind: ConfigMap
metadata:
  name: grafana-dashboard
data:
  inference.json: |
    {
      "uid": "inference-golden",
      "title": "Inference Platform — Golden Signals",
      "tags": ["inference"],
      "timezone": "browser",
      "schemaVersion": 39,
      "version": 1,
      "refresh": "5s",
      "time": { "from": "now-15m", "to": "now" },
      "panels": [
        {
          "id": 1,
          "title": "Request rate (req/s)",
          "type": "timeseries",
          "gridPos": { "h": 8, "w": 12, "x": 0, "y": 0 },
          "targets": [
            {
              "expr": "sum(rate(requests_total[1m])) by (endpoint)",
              "legendFormat": "{{endpoint}}"
            }
          ]
        },
        {
          "id": 2,
          "title": "Latency p50 / p99 (s)",
          "type": "timeseries",
          "gridPos": { "h": 8, "w": 12, "x": 12, "y": 0 },
          "targets": [
            {
              "expr": "histogram_quantile(0.50, sum(rate(request_latency_seconds_bucket[1m])) by (le, endpoint))",
              "legendFormat": "p50 {{endpoint}}"
            },
            {
              "expr": "histogram_quantile(0.99, sum(rate(request_latency_seconds_bucket[1m])) by (le, endpoint))",
              "legendFormat": "p99 {{endpoint}}"
            }
          ]
        },
        {
          "id": 3,
          "title": "Error rate (5xx fraction)",
          "type": "timeseries",
          "gridPos": { "h": 8, "w": 12, "x": 0, "y": 8 },
          "targets": [
            {
              "expr": "(sum(rate(requests_total{status=~\"5..\"}[1m])) or vector(0)) / clamp_min(sum(rate(requests_total[1m])), 1)",
              "legendFormat": "error fraction"
            }
          ]
        },
        {
          "id": 4,
          "title": "In-flight requests",
          "type": "timeseries",
          "gridPos": { "h": 8, "w": 12, "x": 12, "y": 8 },
          "targets": [
            {
              "expr": "sum(inflight_requests)",
              "legendFormat": "inflight"
            }
          ]
        },
        {
          "id": 5,
          "title": "Batch size (avg over 1m) & p99",
          "type": "timeseries",
          "gridPos": { "h": 8, "w": 24, "x": 0, "y": 16 },
          "targets": [
            {
              "expr": "sum(rate(batch_size_sum[1m])) / clamp_min(sum(rate(batch_size_count[1m])), 1)",
              "legendFormat": "avg batch size"
            },
            {
              "expr": "histogram_quantile(0.99, sum(rate(batch_size_bucket[1m])) by (le))",
              "legendFormat": "p99 batch size"
            }
          ]
        }
      ]
    }
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: grafana
  labels:
    app: grafana
spec:
  replicas: 1
  selector:
    matchLabels:
      app: grafana
  template:
    metadata:
      labels:
        app: grafana
    spec:
      containers:
        - name: grafana
          image: grafana/grafana:11.1.0
          ports:
            - containerPort: 3000
          env:
            - name: GF_SECURITY_ADMIN_USER
              value: admin
            - name: GF_SECURITY_ADMIN_PASSWORD
              value: admin
            - name: GF_AUTH_ANONYMOUS_ENABLED
              value: "true"
            - name: GF_AUTH_ANONYMOUS_ORG_ROLE
              value: Admin
          volumeMounts:
            - name: datasources
              mountPath: /etc/grafana/provisioning/datasources
            - name: dashboard-provider
              mountPath: /etc/grafana/provisioning/dashboards
            - name: dashboards
              mountPath: /var/lib/grafana/dashboards
      volumes:
        - name: datasources
          configMap:
            name: grafana-datasources
        - name: dashboard-provider
          configMap:
            name: grafana-dashboard-provider
        - name: dashboards
          configMap:
            name: grafana-dashboard
---
apiVersion: v1
kind: Service
metadata:
  name: grafana
  labels:
    app: grafana
spec:
  type: ClusterIP
  selector:
    app: grafana
  ports:
    - port: 3000
      targetPort: 3000
